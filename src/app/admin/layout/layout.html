<div class="admin-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Admin Panel</h2>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/manage" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/manage/employees" routerLinkActive="active">
        Employees
      </a>
      <a routerLink="/manage/departments" routerLinkActive="active">
        Departments
      </a>
    </nav>
    <div class="sidebar-footer">
      <span class="user-name">{{ user()?.firstName }} {{ user()?.lastName }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <router-outlet />
  </main>
</div>
