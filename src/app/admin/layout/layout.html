<div class="admin-container">
  <header class="topbar" role="banner">
    <span class="topbar-brand">
      @if (logo(); as src) {
        <img [src]="src" alt="" class="topbar-logo" />
      }
      <span class="topbar-title">{{ companyName() }} · Admin</span>
    </span>
    <button type="button" class="topbar-logout" (click)="logout()">Logout</button>
  </header>

  <aside class="sidebar" role="navigation" aria-label="Admin navigation">
    <div class="sidebar-header">
      @if (logo(); as src) {
        <img [src]="src" alt="" class="sidebar-logo" />
      }
      <h2>{{ companyName() }}</h2>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/manage" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/manage/employees" routerLinkActive="active">Employees</a>
      <a routerLink="/manage/departments" routerLinkActive="active">Departments</a>
      <a routerLink="/manage/requests" routerLinkActive="active">Requests</a>
      <a routerLink="/manage/payroll" routerLinkActive="active">Payroll</a>
      <a routerLink="/manage/cash-advances" routerLinkActive="active">Cash Advances</a>
      <a routerLink="/manage/reports" routerLinkActive="active">Reports</a>
      <a routerLink="/manage/settings" routerLinkActive="active">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <span class="user-name">{{ user()?.firstName }} {{ user()?.lastName }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <router-outlet />
  </main>

  <nav class="bottom-nav" role="navigation" aria-label="Primary">
    <a routerLink="/manage" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="bottom-nav-item">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
      </svg>
      <span class="bottom-nav-label">Dashboard</span>
    </a>
    <a routerLink="/manage/employees" routerLinkActive="active" class="bottom-nav-item">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      <span class="bottom-nav-label">Employees</span>
    </a>
    <a routerLink="/manage/requests" routerLinkActive="active" class="bottom-nav-item">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M19 3h-4.18A2.99 2.99 0 0 0 12 1a2.99 2.99 0 0 0-2.82 2H5a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 0a1 1 0 1 1-1 1 1 1 0 0 1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9z"/>
      </svg>
      <span class="bottom-nav-label">Requests</span>
    </a>
    <a routerLink="/manage/payroll" routerLinkActive="active" class="bottom-nav-item">

      </svg>
      <span class="bottom-nav-label">Payroll</span>
    </a>
    <a routerLink="/manage/reports" routerLinkActive="active" class="bottom-nav-item">

</div>
