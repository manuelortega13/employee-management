@if (pending(); as p) {
  <div
    class="overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-title"
    (click)="cancel()"
  >
    <div class="dialog" (click)="$event.stopPropagation()">
      <div class="header">
        <h2 class="title" id="confirm-title">{{ p.title }}</h2>
        <button type="button" class="btn-close" (click)="cancel()" aria-label="Close">
          &times;
        </button>
      </div>
      <p class="message">{{ p.message }}</p>
      <div class="actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()">
          {{ p.cancelText }}
        </button>
        <button
          type="button"
          [class]="'btn ' + (p.variant === 'danger' ? 'btn-danger' : 'btn-primary')"
          (click)="confirm()"
          cdkFocusInitial
        >
          {{ p.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
